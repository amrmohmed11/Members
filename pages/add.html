<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>add members</title>
    <!-- add google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- add bootstrap links -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <!-- adds Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/add.css" />
  </head>
  <body>
    <div class="form-card">
      <div style="text-align: center">
        <span class="subhead">✨ يرجى ملء البيانات بدقة ✨</span>
      </div>

      <!-- نموذج يحتوي على 3 مدخلات فقط (input) -->
      <form id="mainForm" action="#" method="post">
        <!-- المدخل الأول: الاسم الكامل (نص) -->
        <div class="input-group">
          <label>
            <span>الاسم الكامل</span>
            <span class="required-star">*</span>
          </label>
          <input
            type="text"
            id="fullName"
            name="fullname"
            class="input-field"
            placeholder="مثال: أحمد محمد عبدالله"
            required
            autocomplete="name"
            dir="auto"
            maxlength="25"
          />
        </div>

        <!-- المدخل الثاني: البريد الإلكتروني (type email) -->
        <div class="input-group">
          <label>
            <span>البريد الإلكتروني</span>
            <span class="required-star">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            class="input-field"
            placeholder="example@domain.com"
            required
            autocomplete="email"
            dir="ltr"
          />
        </div>

        <!-- المدخل الثالث: رقم الهاتف (type tel) -->
        <div class="input-group">
          <label>
            <span>رقم الهاتف</span>
            <span class="required-star">*</span>
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            class="input-field"
            placeholder="12345678912"
            required
            autocomplete="tel"
            dir="ltr"
          />
        </div>

        <!-- زر الإرسال (ليس input بل button -> لا يُحتسب ضمن الـ 3 inputs) -->
        <button type="submit" class="submit-btn">
          <span>📨</span> إرسال النموذج
        </button>
      </form>

      <!-- منطقة عرض رسالة بعد الإرسال (تغذية راجعة) -->
      <div id="formFeedback" class="feedback-message">
        ⚡ سيتم عرض ملخص بياناتك بعد الإرسال
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
      integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
      integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
      crossorigin="anonymous"
    ></script>
    <script src="../js/add.js"></script>
  </body>
</html>
